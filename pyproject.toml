[build-system]
requires = ["uv_build>=0.8.10,<0.9.0"]
build-backend = "uv_build"

[project]
name = "metaconf"
version = "0.3.2"
authors = [
    {name = "Joe Marsh Rossney", email = "17361029+jmarshrossney@users.noreply.github.com"}
]
description = "Simple meta-configuration of configuration files using Python dataclasses."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pre-commit>=4.2.0",
    "pytest>=8.4.1",
    "pytest-cov>=6.2.1",
    "pyright>=1.1.402",
    "ruff>=0.12.3",
]
docs = [
    "markdown-exec[ansi]>=1.11.0",
    "mkdocs>=1.6.1",
    "mkdocs-include-exclude-files>=0.1.0",
    "mkdocs-include-markdown-plugin>=7.1.6",
    "mkdocs-ipynb>=0.1.1",
    "mkdocs-material>=9.6.16",
    "mkdocstrings[python]>=0.30.0",
]
examples = [
    "jupyter>=1.1.1",
    "jupytext>=1.17.2",
    "f90nml>=1.4.5",
    "numpy>=2.3.2",
    "xarray>=2025.7.1",
    "pyyaml>=6.0.2",
    "netcdf4>=1.7.2",
]

[tool.uv]
default-groups = ["dev", "docs"]

[tool.ruff]
exclude = [
    ".venv",
]
line-length = 88
indent-width = 4
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
    "PT",  # flake8-pytest-style
    "I",   # isort
]

[tool.ruff.lint.isort]
known-first-party = ["metaconf"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short"

[tool.coverage.run]
source = ["src/metaconf"]

[tool.coverage.report]
show_missing = true
fail_under = 60

[tool.pyright]
typeCheckingMode = "basic"
include = ["src/metaconf", "tests"]
venvPath = "."
venv = ".venv"
reportMissingTypeStubs = false

[tool.jupytext]
formats = "ipynb,md"
